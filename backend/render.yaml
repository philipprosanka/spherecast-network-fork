services:
  - type: web
    name: agnes-supply-chain
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash run.sh
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: AGNES_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CHROMA_DIR
        value: /var/data/chroma
      - key: CACHE_DIR
        value: /var/data/cache
    disk:
      name: agnes-data
      mountPath: /var/data
      sizeGB: 5
