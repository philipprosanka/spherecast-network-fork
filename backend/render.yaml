services:
  - type: web
    name: agnes-supply-chain
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/build_index.py && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
